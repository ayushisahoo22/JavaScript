<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Changer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <button>Home</button>
        <div class="card">
            <h2>Color Scheme Switcher</h2>
            <div class="boxes">
                <div data-color="yellowgreen" class="box yellow"></div>
                <div data-color="grey" class="box grey"></div>
                <div data-color="skyblue" class="box blue"></div>
                <div data-color="rosybrown" class="box rosy"></div>
            </div>
            <h3>Try clicking on one of the colors above to change the background color of this page!</h3>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
